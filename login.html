<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion - BooksForYou</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>

    <div class="auth-card">
        <h2>Connexion</h2>
        <div id="error-box" class="error-message"></div>
        
        <div class="auth-group">
            <label>Email</label>
            <input type="email" id="login-email" placeholder="votre@email.com">
        </div>

        <div class="auth-group">
            <label>Mot de passe</label>
            <input type="password" id="login-pass" placeholder="••••••••">
        </div>

        <button onclick="handleLogin()" class="btn-auth">Se connecter</button>

        <div class="auth-footer">
            Nouveau ici ? <a href="register.html">Créer un compte</a>
        </div>
    </div>

    <script>
        const API = "https://api.craftpick.fr/booksforyou";

        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-pass').value;
            const errorBox = document.getElementById('error-box');

            try {
                const res = await fetch(`${API}/auth/login.php`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();
                if (data.success) {
                    // On stocke les infos utilisateur dans le navigateur
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = "index.html";
                } else {
                    errorBox.innerText = data.error;
                    errorBox.style.display = "block";
                }
            } catch (e) {
                errorBox.innerText = "Erreur de connexion au serveur.";
                errorBox.style.display = "block";
            }
        }
    </script>
</body>
</html>
