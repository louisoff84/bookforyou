<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Book For You | Accueil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Outfit', sans-serif; background: #0b0e14; color: white; }</style>
</head>
<body class="p-6">
    <nav class="max-w-7xl mx-auto flex justify-between items-center mb-12">
        <h1 class="text-3xl font-black text-indigo-500">BOOK FOR YOU</h1>
        <div class="flex gap-6 items-center" id="nav-links">
            <a href="books/editor.html" class="hover:text-indigo-400">Écrire</a>
            </div>
    </nav>

    <main class="max-w-7xl mx-auto">
        <h2 class="text-4xl font-bold mb-8 text-center">Découvrir des histoires</h2>
        <div id="book-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
    </main>

    <script>
        const API = "https://api.craftpick.fr/booksforyou/api.php";
        
        async function loadBooks() {
            const r = await fetch(`${API}?action=get_books`);
            const books = await r.json();
            document.getElementById('book-grid').innerHTML = books.map(b => `
                <div class="bg-white/5 p-6 rounded-3xl border border-white/10 hover:border-indigo-500 transition">
                    <h3 class="text-xl font-bold">${b.title}</h3>
                    <p class="text-indigo-400 text-sm mb-4 italic">Par ${b.author_name}</p>
                    <p class="text-gray-400 line-clamp-3">${b.content}</p>
                </div>
            `).join('');
        }

        const user = localStorage.getItem('user');
        const nav = document.getElementById('nav-links');
        if(user) {
            nav.innerHTML += `<a href="auth/logout.html" class="bg-white/10 px-4 py-2 rounded-lg">Déconnexion</a>`;
        } else {
            nav.innerHTML += `<a href="auth/login.html" class="bg-indigo-600 px-4 py-2 rounded-lg">Connexion</a>`;
        }
        loadBooks();
    </script>
</body>
</html>
