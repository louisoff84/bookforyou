<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Éditeur | Book For You</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
</head>
<body class="bg-[#0b0e14] text-white p-8">
    <div class="max-w-4xl mx-auto">
        <a href="../index.html" class="text-indigo-400 mb-6 block">← Retour</a>
        <div class="bg-white/5 p-8 rounded-3xl border border-white/10">
            <input id="title" type="text" placeholder="Titre de l'histoire" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-4 outline-none text-2xl font-bold">
            
            <div class="flex gap-4 mb-4">
                <button onclick="document.getElementById('docx').click()" class="flex-1 bg-white/5 border border-white/10 p-3 rounded-xl text-sm">📁 Import Docx</button>
                <input type="file" id="docx" class="hidden" accept=".docx">
                <button onclick="fixAI()" id="ai-btn" class="flex-1 bg-indigo-600/20 text-indigo-400 border border-indigo-500/30 p-3 rounded-xl text-sm font-bold italic">✨ Correction IA</button>
            </div>

            <textarea id="content" rows="15" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-6 outline-none" placeholder="Racontez votre histoire..."></textarea>
            <button onclick="publish()" class="w-full bg-indigo-600 p-4 rounded-xl font-bold text-lg">PUBLIER</button>
        </div>
    </div>

    <script>
        const API = "https://api.craftpick.fr/booksforyou/api.php";

        // Import Docx
        document.getElementById('docx').onchange = function(e) {
            let reader = new FileReader();
            reader.onload = ev => {
                mammoth.extractRawText({arrayBuffer: ev.target.result})
                    .then(r => document.getElementById('content').value = r.value);
            };
            reader.readAsArrayBuffer(this.files[0]);
        };

        // Correction IA
        async function fixAI() {
            const btn = document.getElementById('ai-btn');
            const txt = document.getElementById('content').value;
            if(!txt) return;
            btn.innerText = "Analyse IA...";
            const r = await fetch(`${API}?action=ai_fix`, {
                method: 'POST',
                body: JSON.stringify({ text: txt })
            });
            const d = await r.json();
            document.getElementById('content').value = d.choices[0].message.content;
            btn.innerText = "✨ Correction IA";
        }

        // Publier
        async function publish() {
            const userData = JSON.parse(localStorage.getItem('user'));
            if(!userData) return alert("Connectez-vous pour publier !");

            const payload = {
                title: document.getElementById('title').value,
                content: document.getElementById('content').value,
                author: atob(userData.token), // On décode le pseudo du token base64
                user_id: userData.user_id
            };
            await fetch(`${API}?action=publish`, { method: 'POST', body: JSON.stringify(payload) });
            alert("Livre publié avec succès !");
            window.location.href = "../index.html";
        }
    </script>
</body>
</html>
