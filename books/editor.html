<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Éditeur | Book For You</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Outfit', sans-serif; 
            background: #0b0e14; 
            color: white; 
            min-height: screen;
        }
        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255,255,255,0.08); 
        }
        .neon-focus:focus {
            border-color: #6366f1;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
        }
        .btn-primary {
            background: linear-gradient(90deg, #6366f1, #a855f7);
            transition: all 0.3s ease;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px #6366f1;
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <a href="../index.html" class="flex items-center text-gray-400 hover:text-white transition">
                <span class="mr-2">←</span> Retour à la bibliothèque
            </a>
            <div id="user-status" class="text-sm font-bold text-indigo-400 bg-indigo-500/10 px-4 py-1 rounded-full border border-indigo-500/20">
                Mode Auteur
            </div>
        </div>

        <div class="glass p-6 md:p-10 rounded-[2.5rem] shadow-2xl">
            <input id="title" type="text" placeholder="Titre de votre histoire..." 
                class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl mb-6 outline-none text-3xl font-black neon-focus transition-all">
            
            <div class="flex flex-col md:flex-row gap-4 mb-6">
                <button onclick="document.getElementById('docx-input').click()" 
                    class="flex-1 bg-white/5 border border-white/10 p-4 rounded-xl text-sm hover:bg-white/10 transition flex items-center justify-center gap-2">
                    <span>📁</span> Importer un Google Docs (.docx)
                </button>
                <input type="file" id="docx-input" class="hidden" accept=".docx">

                <button onclick="fixAI()" id="ai-btn" 
                    class="flex-1 bg-purple-600/10 text-purple-400 border border-purple-500/30 p-4 rounded-xl text-sm font-bold italic hover:bg-purple-600/20 transition flex items-center justify-center gap-2">
                    <span>✨</span> Correction IA (Groq)
                </button>
            </div>

            <textarea id="content" rows="18" 
                class="w-full bg-white/5 border border-white/10 p-6 rounded-2xl mb-8 outline-none neon-focus transition-all resize-none leading-relaxed text-gray-200" 
                placeholder="Il était une fois dans un monde lointain..."></textarea>
            
            <button onclick="publish()" id="publish-btn" 
                class="w-full btn-primary p-5 rounded-2xl font-black text-xl uppercase tracking-widest">
                Mettre en ligne sur Book For You
            </button>
        </div>
    </div>

    <script>
        const API = "https://api.craftpick.fr/booksforyou/api.php";

        // 1. Gérer l'importation de fichier Docx
        document.getElementById('docx-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const arrayBuffer = event.target.result;
                mammoth.extractRawText({ arrayBuffer: arrayBuffer })
                    .then(function(result) {
                        document.getElementById('content').value = result.value;
                    })
                    .catch(function(err) {
                        console.error(err);
                        alert("Erreur lors de la lecture du fichier .docx");
                    });
            };
            reader.readAsArrayBuffer(file);
        });

        // 2. Correction IA avec sécurité anti-crash
        async function fixAI() {
            const btn = document.getElementById('ai-btn');
            const textarea = document.getElementById('content');
            const originalText = textarea.value;
            
            if (!originalText || originalText.length < 5) {
                return alert("Veuillez écrire au moins quelques mots avant de corriger.");
            }

            btn.innerText = "⏳ Analyse en cours...";
            btn.disabled = true;

            try {
                const r = await fetch(`${API}?action=ai_fix`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: originalText })
                });

                const data = await r.json();

                // On vérifie la structure de réponse de Groq/OpenAI
                if (data.choices && data.choices[0] && data.choices[0].message) {
                    textarea.value = data.choices[0].message.content;
                } else {
                    throw new Error("Structure de réponse IA invalide");
                }

            } catch (err) {
                console.error("Erreur IA:", err);
                alert("L'IA n'est pas disponible pour le moment. Vérifiez votre clé Groq ou votre connexion.");
            } finally {
                btn.innerText = "✨ Correction IA (Groq)";
                btn.disabled = false;
            }
        }

        // 3. Publier l'histoire
        async function publish() {
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            const btn = document.getElementById('publish-btn');
            
            // Vérification de connexion
            const userData = JSON.parse(localStorage.getItem('user'));
            if (!userData) {
                alert("Vous devez être connecté pour publier.");
                window.location.href = "../auth/login.html";
                return;
            }

            if (!title || !content) {
                return alert("Titre et contenu obligatoires !");
            }

            btn.innerText = "PUBLICATION...";
            btn.disabled = true;

            try {
                const payload = {
                    title: title,
                    content: content,
                    author: atob(userData.token), // On récupère le pseudo
                    user_id: userData.user_id
                };

                const r = await fetch(`${API}?action=publish`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (r.ok) {
                    alert("✨ Votre oeuvre est désormais publique !");
                    window.location.href = "../index.html";
                } else {
                    alert("Erreur lors de la publication.");
                }
            } catch (err) {
                alert("Impossible de contacter le serveur.");
            } finally {
                btn.innerText = "Mettre en ligne sur Book For You";
                btn.disabled = false;
            }
        }

        // Vérification au chargement si l'utilisateur est bien là
        window.onload = () => {
            const user = localStorage.getItem('user');
            if(!user) {
                alert("Veuillez vous connecter pour accéder à l'éditeur.");
                window.location.href = "../auth/login.html";
            }
        };
    </script>
</body>
</html>
