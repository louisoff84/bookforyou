<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Éditeur Pro - BooksForYou</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="editor-page">

    <nav class="navbar">
        <div class="nav-container container">
            <a href="index.html" class="logo">BooksForYou</a>
            <div class="nav-links">
                <a href="profil.html">Mon Profil</a>
                <button onclick="logout()" class="btn-logout">Quitter</button>
            </div>
        </div>
    </nav>

    <main class="container editor-layout">
        <aside class="editor-sidebar">
            <div class="card tool-box">
                <h3>Outils d'écriture</h3>
                <div class="form-group">
                    <label>Import Google Doc</label>
                    <input type="text" id="gdoc-url" placeholder="Lien de partage public">
                    <button onclick="importGDoc()" class="btn btn-primary w-100">Importer</button>
                </div>
                <hr>
                <div class="stats-box">
                    <span id="char-count">0</span> caractères
                    <br>
                    <span id="page-count">1</span> page(s) détectée(s)
                </div>
                <button onclick="saveBook()" class="btn btn-save w-100">🚀 Publier / Enregistrer</button>
            </div>
        </aside>

        <section class="editor-main">
            <input type="text" id="title" class="title-input" placeholder="Titre de votre œuvre...">
            <textarea id="content" placeholder="Écrivez votre histoire ici... 
Utilisez '---' sur une nouvelle ligne pour créer un nouveau chapitre."></textarea>
        </section>
    </main>

    <script src="app.js"></script>
    <script src="editor.js"></script>
</body>
</html>
