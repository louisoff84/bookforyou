<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil - BooksForYou</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container container">
            <a href="index.html" class="logo">BooksForYou</a>
            <div class="nav-links">
                <a href="index.html">🏠 <span>Accueil</span></a>
                <a href="ecrire.html" class="btn btn-primary" style="color: white !important;">✍️ <span>Écrire</span></a>
                <a href="profil.html" class="active">👤 <span id="user-name-display">Profil</span></a>
                <button onclick="logout()" class="btn btn-logout">🚪</button>
            </div>
        </div>
    </nav>

    <main class="container profile-layout">
        
        <aside class="profile-sidebar">
            <div class="profile-card">
                <div class="pdp-container" style="margin: 0 auto;">
                    <img id="current-pdp" class="pdp-preview" src="https://api.craftpick.fr/booksforyou/uploads/default.png" alt="Photo de profil">
                    <label class="pdp-upload-btn" for="pdp-input">
                        📷
                    </label>
                    <input type="file" id="pdp-input" accept="image/*" style="display: none;" onchange="previewAndUploadPDP(this)">
                </div>

                <h2 id="profile-username">Pseudo</h2>
                <p class="text-muted">Écrivain passionné</p>

                <div class="stats-box">
                    <div class="stat-item">
                        <span class="stat-val" id="book-count">0</span>
                        <span class="stat-lbl">Livres</span>
                    </div>
                </div>
            </div>
        </aside>

        <section class="profile-main">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1 style="font-size: 1.8rem; font-weight: 800;">📚 Mes Histoires</h1>
                <a href="ecrire.html" class="btn btn-primary">➕ Nouveau</a>
            </div>

            <div id="my-books-list" class="book-management-grid">
                <p class="text-muted">Chargement de vos œuvres...</p>
            </div>
        </section>

    </main>

    <script src="app.js"></script>
</body>
</html>
