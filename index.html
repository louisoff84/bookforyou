<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>BooksForYou</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: auto; padding: 20px; background: #f4f4f4; }
        .card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 200px; margin: 10px 0; }
        .pp-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid #333; }
        .draft { border-left: 5px solid orange; }
    </style>
</head>
<body>

    <div class="card" id="profile-section">
        <img id="my-pp" src="default_pp.png" class="pp-img">
        <input type="file" id="pp-file">
        <button onclick="uploadPP()">Changer Photo</button>
    </div>

    <div class="card">
        <h2>Nouvel Ouvrage</h2>
        <input type="text" id="title" placeholder="Titre">
        <textarea id="content" placeholder="Écrivez ici..."></textarea>
        <button onclick="saveDraft()">Enregistrer en Brouillon</button>
    </div>

    <div id="my-drafts"></div>
    <hr>
    <h2>Dernières Publications</h2>
    <div id="feed"></div>

    <script>
        const API = "https://api.craftpick.fr/booksforyou";
        const USER_ID = 1; // Simulation utilisateur connecté

        // 1. Sauvegarder un brouillon
        async function saveDraft() {
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            await fetch(`${API}/api/books.php`, {
                method: 'POST',
                body: JSON.stringify({ user_id: USER_ID, title, content })
            });
            loadDrafts();
        }

        // 2. Charger les brouillons (pour regarder avant de publier)
        async function loadDrafts() {
            const res = await fetch(`${API}/api/books.php?user_id=${USER_ID}&status=draft`);
            const drafts = await res.json();
            let html = '<h2>Mes Brouillons (Privé)</h2>';
            drafts.forEach(b => {
                html += `<div class="card draft">
                    <h3>${b.title}</h3>
                    <p>${b.content.substring(0, 100)}...</p>
                    <button onclick="publish(${b.id})">Publier</button>
                </div>`;
            });
            document.getElementById('my-drafts').innerHTML = html;
        }

        // 3. Publier un brouillon
        async function publish(id) {
            await fetch(`${API}/api/books.php`, {
                method: 'POST',
                body: JSON.stringify({ action: 'publish', id: id })
            });
            loadDrafts();
            loadFeed();
        }

        // 4. Flux public
        async function loadFeed() {
            const res = await fetch(`${API}/api/books.php?status=published`);
            const books = await res.json();
            let html = '';
            books.forEach(b => {
                html += `<div class="card">
                    <h3>${b.title} <small>par ${b.username}</small></h3>
                    <p>${b.content}</p>
                </div>`;
            });
            document.getElementById('feed').innerHTML = html;
        }

        // 5. Upload PP
        async function uploadPP() {
            const file = document.getElementById('pp-file').files[0];
            const formData = new FormData();
            formData.append('pp', file);
            formData.append('user_id', USER_ID);
            const res = await fetch(`${API}/api/upload_pp.php`, { method: 'POST', body: formData });
            const data = await res.json();
            if(data.success) document.getElementById('my-pp').src = `${API}/uploads/pp/${data.url}`;
        }

        // Initialisation
        loadDrafts();
        loadFeed();
    </script>
</body>
</html>
