<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecture - Book For You</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <nav>
        <a href="../index.html" class="logo">📚 Book For You</a>
        <a href="../index.html" class="btn-secondary">Retour à l'accueil</a>
    </nav>

    <div class="reader-container">
        <h1 id="title">Chargement...</h1>
        <p class="reader-meta">Par <span id="author">...</span></p>
        <div id="content" class="reader-content">
            Un instant, votre histoire se prépare...
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script>
        // Récupérer l'ID du livre dans l'URL (?id=X)
        const urlParams = new URLSearchParams(window.location.search);
        const bookId = urlParams.get('id');

        async function fetchBook() {
            if(!bookId) {
                document.getElementById('content').innerText = "Livre introuvable.";
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/books/get_book.php?id=${bookId}`);
                const book = await response.json();

                if(response.ok && book) {
                    document.getElementById('title').innerText = book.title;
                    document.getElementById('author').innerText = "@" + book.username;
                    document.getElementById('content').innerText = book.content || "Ce livre n'a pas encore de contenu écrit.";
                } else {
                    document.getElementById('content').innerText = "Impossible de charger ce livre.";
                }
            } catch (err) {
                document.getElementById('content').innerText = "Erreur de connexion au serveur.";
            }
        }

        fetchBook();
    </script>
</body>
</html>
