<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BooksForYou - Partagez vos histoires</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container container">
            <a href="index.html" class="logo">BooksForYou</a>
            
            <div class="nav-links">
                <a href="index.html" class="active">🏠 <span>Accueil</span></a>
                <a href="ecrire.html" class="btn btn-primary" style="color: white !important;">✍️ <span>Écrire</span></a>
                
                <div id="auth-links" style="display: flex; gap: 15px; align-items: center;">
                    <a href="profil.html">👤 <span id="user-name-display">Profil</span></a>
                    <button onclick="logout()" class="btn btn-logout">🚪</button>
                </div>
            </div>
        </div>
    </nav>

    <header class="container" style="margin-top: 40px; text-align: center;">
        <h1 style="font-size: 2.5rem; margin-bottom: 10px;">Découvrez des histoires uniques</h1>
        <p class="text-muted" style="font-size: 1.1rem;">Lisez, écrivez et partagez vos aventures avec la communauté.</p>
    </header>

    <main class="container">
        <div id="feed" class="book-grid">
            <div class="loading" style="grid-column: 1/-1; text-align: center; padding: 50px;">
                <p>Chargement des dernières histoires...</p>
            </div>
        </div>
    </main>

    <div id="reader-overlay" class="reader-overlay">
        <header class="reader-header">
            <h2 id="reader-title">Titre de l'œuvre</h2>
            <button onclick="closeReader()" class="btn btn-danger">✕ Fermer</button>
        </header>

        <div class="reader-container">
            <aside class="reader-sidebar">
                <div class="sidebar-label">Onglets du document</div>
                <div id="tabs-list" class="tabs-list">
                    </div>
            </aside>

            <main class="reader-body">
                <div id="reader-content" class="page-animate">
                    </div>
            </main>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Si non connecté, afficher le bouton de Connexion
        if (!USER_ID) {
            document.getElementById('auth-links').innerHTML = `
                <a href="login.html" class="btn btn-primary">Connexion</a>
            `;
        }
    </script>
</body>
</html>
